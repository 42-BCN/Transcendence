services:
  socket:
    build:
      target: prod
    environment:
      NODE_ENV: production
    volumes:
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts:ro
    restart: unless-stopped

  frontend:
    build:
      target: prod
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      HTTPS_KEY_PATH: /certs/localhost.key
      HTTPS_CERT_PATH: /certs/localhost.crt
    volumes:
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts:ro
    restart: unless-stopped

  backend:
    build:
      target: prod
    environment:
      NODE_ENV: production
    volumes:
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts:ro
    restart: unless-stopped

  nginx:
    restart: unless-stopped
