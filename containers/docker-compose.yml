services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./database/docker/.env.${APP_ENV:-development}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  socket:
    build:
      context: .
      dockerfile: ./socket/docker/Dockerfile
    working_dir: /app
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      CERT_DIR: /certs
      NODE_EXTRA_CA_CERTS: /certs/ca.pem
      BACKEND_SESSION_IDENTITY_URL: https://backend:4000/auth/session/identity
    networks:
      - edge

  frontend:
    build:
      context: .
      dockerfile: ./frontend/docker/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://localhost:8443}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-https://localhost:8443}
        NEXT_PUBLIC_LOCALE_COOKIE_NAME: ${NEXT_PUBLIC_LOCALE_COOKIE_NAME:-locale}
    working_dir: /app
    expose:
      - "3000"
    env_file:
      - ./frontend/docker/.env.${APP_ENV:-development}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NODE_EXTRA_CA_CERTS: /certs/ca.pem
      API_BASE_URL: https://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--cacert",
          "/certs/ca.pem",
          "-f",
          "https://localhost:3000/api/health",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edge

  backend:
    build:
      context: .
      dockerfile: ./backend/docker/Dockerfile
    working_dir: /app
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/docker/.env.${APP_ENV:-development}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      SOCKET_SERVICE_URL: https://socket:3100
      CERT_DIR: /certs
      NODE_EXTRA_CA_CERTS: /certs/ca.pem
    networks:
      - backend
      - edge
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--cacert",
          "/certs/ca.pem",
          "-f",
          "https://localhost:4000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8443:443"
    env_file:
      - ./nginx/.env.${APP_ENV:-development}
    volumes:
      - ./nginx:/etc/nginx
      - ${CERT_DIR:-../certs}:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edge

networks:
  backend:
    internal: true
  edge:

volumes:
  postgres_data:
  redis_data:
