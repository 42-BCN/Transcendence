services:
  postgres:
    image: postgres:16-alpine
    container_name: app_postgres
    restart: unless-stopped
    env_file:
      - ./database/docker/.env.development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  socket:
    build:
      context: ./socket
      dockerfile: ./docker/Dockerfile
    working_dir: /app
    ports:
      - "3100:3100"
    environment:
      NODE_ENV: development
    volumes:
      - ./socket/app:/app
      - node_modules_socket:/app/node_modules
      - ./contracts:/app/src/contracts
    networks:
      - edge

  frontend:
    build:
      context: ./frontend
      dockerfile: ./docker/Dockerfile
    working_dir: /app
    expose:
      - "3000"
    env_file:
      - ./frontend/docker/.env.development
    volumes:
      - ./frontend/web:/app
      - node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
      - /app/dev
      - ./contracts:/app/src/contracts:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edge

  backend:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile
    working_dir: /app
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/docker/.env.development
    environment:
      DATABASE_URL: postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:5432/${PGDATABASE}?schema=public
    volumes:
      - ./backend/app:/app
      - node_modules_backend:/app/node_modules
      - ./contracts:/app/src/contracts
    networks:
      - backend
      - edge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8443:443"
    env_file:
      - ./nginx/.env.development
    volumes:
      - ./nginx:/etc/nginx
      - ${CERT_DIR:-../certs}:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edge

networks:
  backend:
    internal: true
  edge:

volumes:
  node_modules:
  node_modules_backend:
  node_modules_socket:
  frontend_next_cache:
  postgres_data:
# - [ ] not using container-name for services to avoid conflicts when multiple projects are run on the same host
# networks are not defined to use default bridge network

