services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./database/docker/.env.development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  socket:
    build:
      context: ./socket
      dockerfile: ./docker/Dockerfile
    working_dir: /app
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
      CERT_DIR: /certs
      NODE_EXTRA_CA_CERTS: /certs/ca.pem
      BACKEND_SESSION_IDENTITY_URL: https://backend:4000/auth/session/identity
    volumes:
      - ./socket/app:/app
      - node_modules_socket:/app/node_modules
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts
    networks:
      - edge

  frontend:
    build:
      context: ./frontend
      dockerfile: ./docker/Dockerfile
    working_dir: /app
    expose:
      - "3000"
    env_file:
      - ./frontend/docker/.env.development
    volumes:
      - ./frontend/web:/app
      - node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
      - /app/dev
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--cacert",
          "/certs/ca.pem",
          "-f",
          "https://localhost:3000/api/health",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edge

  backend:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile
    working_dir: /app
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      SOCKET_SERVICE_URL: https://socket:3100
      CERT_DIR: /certs
      NODE_EXTRA_CA_CERTS: /certs/ca.pem
    env_file:
      - ./backend/docker/.env.development
    volumes:
      - ./backend/app:/app
      - node_modules_backend:/app/node_modules
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts
    networks:
      - backend
      - edge
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--cacert",
          "/certs/ca.pem",
          "-f",
          "https://localhost:4000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8443:443"
    env_file:
      - ./nginx/.env.development
    volumes:
      - ./nginx:/etc/nginx
      - ${CERT_DIR:-../certs}:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edge

networks:
  backend:
    internal: true
  edge:

volumes:
  node_modules:
  node_modules_backend:
  node_modules_socket:
  frontend_next_cache:
  postgres_data:
  redis_data:
# - [ ] not using container-name for services to avoid conflicts when multiple projects are run on the same host
# networks are not defined to use default bridge network

