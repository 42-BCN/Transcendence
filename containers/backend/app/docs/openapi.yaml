openapi: 3.0.3
info:
  title: Backend API
  version: 1.0.0
  description: OpenAPI specification for the current Express API routes.
servers:
  - url: /api
    description: Routes exposed through nginx in the local container stack.
  - url: /
    description: Raw Express mount paths inside the backend container.
tags:
  - name: Health
  - name: Public API
  - name: Auth
  - name: Protected
  - name: Game Invitations
  - name: Users
  - name: Friends
  - name: Internal
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthOkResponse'
        '500':
          description: Redis is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthErrorResponse'

  /public-api/health:
    get:
      tags: [Public API]
      summary: Public API health check
      description: Validates the shared API key, then checks Redis and Postgres connectivity.
      operationId: getPublicApiHealth
      security:
        - publicApiKey: []
      responses:
        '200':
          description: Public API dependencies are healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicApiHealthResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Redis, Postgres, or API key configuration is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'

  /public-api/users:
    get:
      tags: [Public API]
      summary: List public users through the API-key-protected public API
      description: Read-only user listing protected by `x-api-key`.
      operationId: getPublicApiUsers
      security:
        - publicApiKey: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
          required: false
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
          required: false
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersListResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'

  /public-api/users/count:
    get:
      tags: [Public API]
      summary: Count public users
      operationId: getPublicApiUsersCount
      security:
        - publicApiKey: []
      responses:
        '200':
          description: Total users count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUsersCountResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'

  /public-api/users/search:
    get:
      tags: [Public API]
      summary: Search users by username through the public API
      description: Case-insensitive search protected by `x-api-key`. Rate limited per API key and client IP.
      operationId: getPublicApiUsersSearch
      security:
        - publicApiKey: []
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 20
      responses:
        '200':
          description: Matching public users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUsersSearchResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'

  /public-api/users/{userId}:
    get:
      tags: [Public API]
      summary: Get a public user by id through the API-key-protected public API
      operationId: getPublicApiUserById
      security:
        - publicApiKey: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Public user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'

  /public-api/users/username/{username}:
    get:
      tags: [Public API]
      summary: Get a public user by username through the API-key-protected public API
      operationId: getPublicApiUserByUsername
      security:
        - publicApiKey: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'

  /auth/signup:
    post:
      tags: [Auth]
      summary: Create a new account with email verification token sent
      operationId: postAuthSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '200':
          description: Account created; verification token sent to email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limited (too many signup attempts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a user with credentials and create a session
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded; session created via sid cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials (including current lockout behavior surfaced as invalid credentials)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Rate limited (too many failed attempts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/recover:
    post:
      tags: [Auth]
      summary: Request password reset email by email or username (public endpoint)
      operationId: postAuthRecover
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoverRequest'
      responses:
        '200':
          description: Request accepted; password reset email sent if user exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoverResponse'
        '429':
          description: Rate limited (too many password reset requests)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend account verification email (public endpoint, non-enumerating)
      operationId: postAuthResendVerification
      description: Public endpoint that does not reveal whether an email exists or verification status. Returns 200 for unknown emails when unauthenticated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
      responses:
        '200':
          description: Request accepted (verification email sent or hidden for privacy)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullResponse'
        '429':
          description: Rate limited (too many resend attempts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address with token and create session
      operationId: postAuthVerifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified and session created via sid cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullResponse'
        '401':
          description: Invalid, already used, or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Email verified token belongs to a blocked user or access is forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limited (too many verification attempts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Set a new password using a reset token
      operationId: postAuthResetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullResponse'
        '401':
          description: Invalid, used, or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limited (too many reset attempts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/google:
    get:
      tags: [Auth]
      summary: Initiate Google OAuth flow (redirect to Google consent screen)
      operationId: getAuthGoogle
      responses:
        '302':
          description: Redirect to Google OAuth consent screen with state parameter for CSRF protection
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/callback/google:
    get:
      tags: [Auth]
      summary: Google OAuth callback handler; creates or links account and session
      operationId: getAuthGoogleCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: OAuth authorization code from Google
        - in: query
          name: state
          required: true
          schema:
            type: string
          description: State parameter for CSRF validation
      responses:
        '302':
          description: Login successful; redirect to /me with session created
        '403':
          description: OAuth state validation failed (CSRF attack detected)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: Internal error (OAuth exchange failed or user creation failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Destroy the active session and clear cookie
      operationId: postAuthLogout
      responses:
        '200':
          description: Session destroyed; sid cookie cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/guest/session:
    post:
      tags: [Auth]
      summary: Create or resume a guest session identity
      description: Returns a guest identity for the current session, or the authenticated user identity when the session already belongs to a user.
      operationId: postAuthGuestSession
      responses:
        '200':
          description: Guest or authenticated session identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionIdentityResponse'
        '401':
          description: Session references a user that no longer exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/session/identity:
    get:
      tags: [Auth]
      summary: Get the current user or guest session identity
      description: Returns the identity stored in the current session. Responds with 401 when no authenticated or guest identity exists.
      operationId: getAuthSessionIdentity
      responses:
        '200':
          description: Current session identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionIdentityResponse'
        '401':
          description: No active user or guest session identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /protected/me:
    get:
      tags: [Protected]
      summary: Get the current session user id
      operationId: getProtectedMe
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionMeResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
    delete:
      tags: [Protected]
      summary: Delete the current authenticated user account
      operationId: deleteProtectedMe
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Account deleted and session destroyed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /protected/me/profile:
    get:
      tags: [Protected]
      summary: Get the current authenticated user's profile
      description: Returns the current authenticated user's own profile data.
      operationId: getProtectedMeProfile
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeProfileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
    put:
      tags: [Protected]
      summary: Update the current authenticated user's profile
      description: Updates the current authenticated user's own profile data.
      operationId: putProtectedMeProfile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeProfileRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeProfileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /protected/me/reset-password:
    post:
      tags: [Protected]
      summary: Change password for the current authenticated user
      description: Verifies the current password and updates it for the authenticated local account.
      operationId: postProtectedMeResetPassword
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullResponse'
        '401':
          description: Unauthorized or current password is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Forbidden (blocked account or unsupported auth provider)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /protected/game-invitations/state:
    get:
      tags: [Game Invitations]
      summary: Get canonical game invitation state for the current user
      operationId: getProtectedGameInvitationsState
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current invitation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetGameInvitationStateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'

  /protected/game-invitations/send:
    post:
      tags: [Game Invitations]
      summary: Send a game invitation to an accepted friend
      operationId: postProtectedGameInvitationSend
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendGameInvitationRequest'
      responses:
        '201':
          description: Invitation created and room context prepared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendGameInvitationResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '403':
          description: Target user is not an accepted friend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '404':
          description: Target user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '409':
          description: Duplicate, expired, cancelled, or room-state conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Invitation send rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'

  /protected/game-invitations/accept:
    post:
      tags: [Game Invitations]
      summary: Accept a pending game invitation
      operationId: postProtectedGameInvitationAccept
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptGameInvitationRequest'
      responses:
        '200':
          description: Invitation accepted and room joined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptGameInvitationResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '404':
          description: Invitation or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '409':
          description: Invitation or room conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'

  /protected/game-invitations/decline:
    post:
      tags: [Game Invitations]
      summary: Decline a pending game invitation
      operationId: postProtectedGameInvitationDecline
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
