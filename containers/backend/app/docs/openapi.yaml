components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid
    publicApiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Shared API key configured in the backend as `PUBLIC_API_KEY`.
    internalSecret:
      type: apiKey
      in: header
      name: x-internal-secret
      description: Shared secret used by the socket service when calling backend-internal endpoints.
  schemas:
    ApiError:
      type: object
      required: [code]
      properties:
        code:
          type: string
        details:
          nullable: true
    ValidationErrorDetails:
      type: object
      required: [fields]
      properties:
        fields:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    GenericErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/ApiError'
    ValidationErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          allOf:
            - $ref: '#/components/schemas/ApiError'
            - type: object
              properties:
                details:
                  $ref: '#/components/schemas/ValidationErrorDetails'
    HealthOkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
    HealthErrorResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [false]
    PublicApiHealthResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [database, redis]
          properties:
            database:
              type: string
              enum: [up]
            redis:
              type: string
              enum: [up]
    NullResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          nullable: true
    InternalOkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
    InternalErrorResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [false]
        errors:
          type: object
          nullable: true
          additionalProperties: true
    AuthUser:
      type: object
      required: [id, email, username]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
        password:
          type: string
          minLength: 1
    RecoverRequest:
      type: object
      required: [identifier]
      properties:
        identifier:
          type: string
    ResendVerificationRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email

    VerifyEmailRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 1

    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          maxLength: 128
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
    SignupResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/AuthUser'
    LoginResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/AuthUser'
    RecoverResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [identifier]
          properties:
            identifier:
              type: string
    SessionMeResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [userId]
          properties:
            userId:
              type: string
              format: uuid
    SessionIdentity:
      type: object
      required: [identityKey, sessionId, username, isGuest]
      properties:
        identityKey:
          type: string
          description: Namespaced identity key in the form `user:<userId>` or `guest:<guestId>`.
        sessionId:
          type: string
        username:
          type: string
        isGuest:
          type: boolean
        userId:
          type: string
          format: uuid
        guestId:
          type: string
          description: Generated guest id stored in the session.
    SessionIdentityResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/SessionIdentity'
    UpdateMeProfileRequest:
      type: object
      additionalProperties: false
      required: [bio, avatar]
      properties:
        bio:
          type: string
          maxLength: 600
        avatar:
          type: string
          nullable: true
          enum:
            - /avatars/avatar-1.png
            - /avatars/avatar-2.png
