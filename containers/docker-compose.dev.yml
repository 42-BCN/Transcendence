services:
  socket:
    build:
      target: dev
    command: npm run dev
    volumes:
      - ./socket/app:/app
      - node_modules_socket:/app/node_modules
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts

  frontend:
    build:
      target: dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend/web:/app
      - node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
      - /app/dev
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts:ro

  backend:
    build:
      target: dev
    command: npm run dev
    volumes:
      - ./backend/app:/app
      - node_modules_backend:/app/node_modules
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts

  nginx:
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file:
      - ./cloudflared/.env.${APP_ENV:-development}
    command:
      - sh
      - -lc
      - |
        if [ -n "$${CLOUDFLARE_TUNNEL_TOKEN:-}" ]; then
          exec cloudflared tunnel run --no-autoupdate --token "$$CLOUDFLARE_TUNNEL_TOKEN"
        fi
        exec cloudflared tunnel --no-autoupdate --protocol http2 --url https://nginx:443 --no-tls-verify
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - edge

  storybook:
    profiles:
      - storybook
    build:
      context: .
      dockerfile: ./frontend/docker/Dockerfile
      target: dev
    working_dir: /app
    command: npm run storybook -- --host 0.0.0.0
    ports:
      - "6006:6006"
    env_file:
      - ./frontend/docker/.env.${APP_ENV:-development}
    environment:
      NODE_ENV: development
      NODE_EXTRA_CA_CERTS: /certs/ca.pem
    volumes:
      - ./frontend/web:/app
      - node_modules:/app/node_modules
      - ${CERT_DIR:-../certs}:/certs:ro
      - ./contracts:/app/src/contracts:ro
    networks:
      - edge

volumes:
  node_modules:
  node_modules_backend:
  node_modules_socket:
  frontend_next_cache:
